name: Email Scanner

on:
  schedule:
    # Elke dag om 07:00 Nederlandse tijd (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # Handmatig starten via GitHub

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer dependencies
        run: pip install pypdf

      - name: Maak config van secrets
        run: |
          cat > jm_config.json << 'PYEOF'
          ${{ secrets.JM_CONFIG_JSON }}
          PYEOF

      - name: Draai scanner
        run: python3 jm_email_scanner.py
        env:
          CI: true

      - name: Upload resultaat naar Worker
        run: |
          if [ ! -f jm_scan_resultaat.json ]; then
            echo "Geen resultaat om te uploaden"
            exit 0
          fi
          curl -sS -X POST https://jm-lead-search.jwz-jjm.workers.dev/scan-result \
            -H "Content-Type: application/json" \
            -H "X-Scan-Token: ${{ secrets.SCAN_TOKEN }}" \
            --data @jm_scan_resultaat.json \
            --fail-with-body
